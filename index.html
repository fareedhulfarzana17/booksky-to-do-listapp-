<html>

        href="img/plus-removebg-preview.png">

</head>

<body>

    <nav>
        <h1 id="bookskyid">BOOKSKY</h1>
    </nav>
    <section id="sectionid"></section>

    <div class="overlay"></div>
    <div class="popupboxclass">

        <h1 id="addbooktitleid">Add book</h1>

        <input placeholder="Book Title" id="booktitleid">

        <input placeholder="Book Author" id="bookauthorid">

        <textarea placeholder="Short Description" id="shortdescriptionid"></textarea><br>
        <button id="addbuttonid">Add</button>
        <button id="closebuttonid">close</button>


    </div>


    <div id="startid">
        <img src="img/plus-removebg-preview.png"
            width="100px" height="100px">
    </div>

    <script src="bookskyscript.js"></script>
</body>

</html>
